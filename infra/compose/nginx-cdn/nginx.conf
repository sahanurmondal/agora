# CDN stand-in: nginx pull-through cache in front of MinIO.
# Cache HIT/MISS is surfaced via X-Cache so k6/curl can assert it.

events {}

http {
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=media:32m
                   max_size=512m inactive=60m use_temp_path=off;

  server {
    listen 80;

    location / {
      proxy_pass http://minio:9000;
      proxy_set_header Host $http_host;

      proxy_cache media;
      proxy_cache_key $request_uri;
      proxy_cache_valid 200 60m;
      proxy_cache_valid 404 10s;
      # Serve stale on origin failure — the CDN availability story.
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
      proxy_cache_lock on;          # request coalescing: one fetch per missed key
      proxy_ignore_headers Set-Cookie;

      add_header X-Cache $upstream_cache_status always;
    }
  }
}
