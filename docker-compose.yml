name: agora

# Profiles: core | replica | search | cdc | media | legacy | chaos | quorum
# Session-1 scope: core only. Other profiles land with their phases.
# RAM budget (core): postgres ~150M + redis ~30M + redpanda 1G (capped) + minio ~150M
#                    + otel-lgtm ~1.5G + console ~100M  =~ 3 GB

services:
  postgres:
    image: postgres:16-alpine
    container_name: agora-postgres
    profiles: ["core"]
    # wal_level=logical: required by Debezium (cdc profile); harmless otherwise
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agora_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/compose/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agora}"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-replica:
    image: postgres:16-alpine
    container_name: agora-postgres-replica
    profiles: ["replica"]
    command: ["sh", "/replica/setup-replica.sh"]
    environment:
      REPLICATION_PASSWORD: repl_local
    ports:
      - "5434:5432"
    volumes:
      - pg-replica-data:/var/lib/postgresql/data
      - ./infra/compose/replica:/replica:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora"]
      interval: 5s
      timeout: 3s
      retries: 20

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: agora-connect
    profiles: ["cdc"]
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: agora-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      HEAP_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8383:8083"   # Connect REST (host 8383; 8083 belongs to catalog-service)
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: agora-opensearch
    profiles: ["search"]
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

  nginx-cdn:
    image: nginx:1.27-alpine
    container_name: agora-nginx-cdn
    profiles: ["media"]
    ports:
      - "8099:80"
    volumes:
      - ./infra/compose/nginx-cdn/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/minio/health/live >/dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: agora-redis
    profiles: ["core"]
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    container_name: agora-redpanda
    profiles: ["core"]
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
    ports:
      - "19092:19092"   # Kafka API (host)
      - "18081:18081"   # Schema Registry (host)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: agora-redpanda-console
    profiles: ["core"]
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "${CONSOLE_PORT:-8085}:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: agora-minio
    profiles: ["core"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agora_local}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: agora-otel-lgtm
    profiles: ["core"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"   # Grafana UI
      - "4317:4317"                    # OTLP gRPC
      - "4318:4318"                    # OTLP HTTP
    volumes:
      - ./infra/observability/dashboards:/otel-lgtm/grafana-dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  pg-data:
  pg-replica-data:
  redpanda-data:
  minio-data:
  opensearch-data:
  nginx-cache:
