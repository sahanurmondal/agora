name: agora

# Profiles: core | replica | search | cdc | media | legacy | chaos | quorum
# Session-1 scope: core only. Other profiles land with their phases.
# RAM budget (core): postgres ~150M + redis ~30M + redpanda 1G (capped) + minio ~150M
#                    + otel-lgtm ~1.5G + console ~100M  =~ 3 GB

services:
  postgres:
    image: postgres:16-alpine
    container_name: agora-postgres
    profiles: ["core"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agora_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/compose/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agora}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agora-redis
    profiles: ["core"]
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    container_name: agora-redpanda
    profiles: ["core"]
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
    ports:
      - "19092:19092"   # Kafka API (host)
      - "18081:18081"   # Schema Registry (host)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: agora-redpanda-console
    profiles: ["core"]
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "${CONSOLE_PORT:-8085}:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: agora-minio
    profiles: ["core"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agora_local}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: agora-otel-lgtm
    profiles: ["core"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"   # Grafana UI
      - "4317:4317"                    # OTLP gRPC
      - "4318:4318"                    # OTLP HTTP
    volumes:
      - ./infra/observability/dashboards:/otel-lgtm/grafana-dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  pg-data:
  redpanda-data:
  minio-data:
