# Test profile: in-memory H2 so `mvn test` needs no Postgres.
spring:
  datasource:
    url: jdbc:h2:mem:identitydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

management:
  tracing:
    sampling:
      probability: 0.0   # no span export from tests
