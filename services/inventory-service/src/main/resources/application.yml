server:
  port: ${INVENTORY_PORT:8087}

spring:
  application:
    name: inventory-service
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5433/inventorydb}
    username: ${POSTGRES_USER:agora}
    password: ${POSTGRES_PASSWORD:agora_local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
